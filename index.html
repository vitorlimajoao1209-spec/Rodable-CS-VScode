<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dust 2 FPS</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        #match-score { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 100; }
        /* Estilo do Chat de Comandos */
        #chat-container { position: absolute; bottom: 60px; left: 10px; z-index: 150; width: 300px; display: none; }
        #chat-input { width: 100%; background: rgba(0,0,0,0.8); color: lime; border: 1px solid lime; padding: 5px; font-family: 'Courier New', monospace; }
        /* Estilo do Painel de Coordenadas */
        #pos-debug { position: absolute; top: 50px; left: 10px; color: yellow; font-family: 'Courier New', monospace; font-size: 12px; z-index: 100; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="pos-debug">X: 0 | Y: 0 | Z: 0</div>
    <div id="match-score">ROUND <span id="hud-round">1</span> | TR: <span id="score-t">0</span></div>
    <div id="hud">$ <span id="hud-money">1600</span> | <span id="hud-weapon">AK47 [30/90]</span></div>
    <div id="crosshair">+</div>
    <div id="info">Clique na tela • ESC solta o mouse • B Loja • F Plantar • ENTER para Chat</div>
    
    <div id="chat-container">
        <input type="text" id="chat-input" placeholder="Digite /voar ou comando...">
    </div>

    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="js/game.js"></script>
</body>
</html>
